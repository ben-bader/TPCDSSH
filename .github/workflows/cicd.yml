name: CI/CD Flask Docker
on:
  push:
    branches: [ main ]

jobs:
  cd:
    name: Docker Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tpcdssh:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/tpcdssh:latest

      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "powershell -ExecutionPolicy Bypass -File C:\Users\deploy\deploy.ps1 -DockerUser ${{ secrets.DOCKER_USERNAME }} -DockerToken ${{ secrets.DOCKER_TOKEN }}"
