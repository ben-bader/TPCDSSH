name: CI/CD Flask Docker
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    name: Build & Deploy Docker
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Step 5: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tpcdssh:latest .

      # Step 6: Run Docker container in GitHub Actions (for testing)
      - name: Run Docker container
        run: |
          docker run -d -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/tpcdssh:latest

      # Optional Step 7: Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tpcdssh:latest